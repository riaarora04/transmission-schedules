<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assisted Document Parsing</title>

    <script
        id="sap-ui-bootstrap"
        src="https://sdk.openui5.org/resources/sap-ui-core.js"
        data-sap-ui-libs="sap.m,sap.f,sap.ui.core,sap.ui.layout,sap.uxap"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-resourceroots='{
            "com.sap.selfbilling.documentparsing": "./"
        }'
        data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="trusted">
    </script>
</head>
<body class="sapUiBody" id="content">
    <div data-sap-ui-component
         data-name="com.sap.selfbilling.documentparsing"
         data-id="container"
         data-settings='{"id": "documentparsing"}'>
    </div>
</body>
</html>
