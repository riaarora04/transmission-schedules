                                    new sap.ui.core.Item({ key: "Invoice", text: "Invoice" }),

                    new sap.m.Column({ header: new sap.m.Label({ text: "Sender" }) }),

                            oModel.setProperty("/selectedSchedule", oData);
                            oListReportPage.setVisible(false);
                            oObjectPage.setVisible(true);
                        },
                        cells: [
                            new sap.m.ObjectIdentifier({ title: "{scheduleId}" }),
                            new sap.m.Text({ text: "{category}" }),
                            new sap.m.Text({ text: "{destination}" }),

                            new sap.m.Text({ text: "{soldToParty}" }),

                                            new sap.m.Label({ text: "Issue Type" }),
                                            new sap.m.Text({ text: "{/selectedSchedule/issueType}" }),
                                            new sap.m.Label({ text: "Sender" }),
                                            new sap.m.Text({ text: "{/selectedSchedule/sender}" }),
                                            new sap.m.Label({ text: "Sold-to Party" }),

                        subSections: [
                            new sap.uxap.ObjectPageSubSection({

                                blocks: [
                                    new sap.ui.layout.form.SimpleForm({
                                        editable: false,
                                        layout: sap.ui.layout.form.SimpleFormLayout.ResponsiveGridLayout,

                                            new sap.m.Text({ text: "{/selectedSchedule/startTime}" }),

                                            new sap.m.Label({ text: "Next Run" }),
                                            new sap.m.Text({ text: "{/selectedSchedule/nextRun}" })
                                        ]
                                    })

                            })
                        ]

                    new sap.uxap.ObjectPageSection({
                        title: "Run History",
                        subSections: [
                            new sap.uxap.ObjectPageSubSection({
                                title: "Recent Runs",
                                blocks: [
                                    new sap.m.Table({
                                        columns: [
                                            new sap.m.Column({ header: new sap.m.Label({ text: "Run Date" }) }),

                                            new sap.m.Column({ header: new sap.m.Label({ text: "Duration" }) }),
                                            new sap.m.Column({ header: new sap.m.Label({ text: "Message" }) })
                                        ],
                                        items: [
                                            new sap.m.ColumnListItem({ cells: [
                                                new sap.m.Text({ text: "2026-03-18 14:30:00" }),
                                                new sap.m.ObjectStatus({ text: "Success", state: sap.ui.core.ValueState.Success }),
                                                new sap.m.Text({ text: "125" }),

            // Set model and place app
            oListReportPage.setModel(oModel);
            oObjectPage.setModel(oModel);
            oTable.setModel(oModel);

            var oApp = new sap.m.App({
                pages: [oListReportPage, oObjectPage]
            });

            oApp.placeAt("content");
        });
    </script>
</head>
