    <script id="sap-ui-bootstrap"

        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="trusted">
    </script>

                        {

                        {

                        },
                        {
                            scheduleId: "SCH-2026-008",
                            description: "Daily customer credit check update",
                            status: "Active",
                            category: "Credit Management",
                            issueType: "Credit Check",
                            soldToParty: "100008",

                            frequency: "Daily",

                            validFrom: "2026-01-20T00:00:00",

                            nextRun: "2026-03-20T06:00:00",
                            lastRun: "2026-03-19T06:00:00",
                            createdBy: "JGARCIA",
                            createdOn: "2026-01-18T12:30:00",
                            changedBy: "JGARCIA",
                            changedOn: "2026-02-28T16:45:00"
                        }
                    ],
                    statusValues: [
                        { key: "", text: "All" },
                        { key: "Active", text: "Active" },
                        { key: "Inactive", text: "Inactive" },
                        { key: "Scheduled", text: "Scheduled" },
                        { key: "Running", text: "Running" },
                        { key: "Error", text: "Error" }
                    ]
                };

                var oModel = new JSONModel(oScheduleData);
                sap.ui.getCore().setModel(oModel, "schedules");

                // Create view inline
                var sView = `<mvc:View
                    controllerName="transmissionschedules.controller.ListReport"
                    xmlns="sap.m"
                    xmlns:mvc="sap.ui.core.mvc"
                    xmlns:f="sap.f"
                    xmlns:core="sap.ui.core"
                    displayBlock="true">

                    <f:DynamicPage id="dynamicPageId" toggleHeaderOnTitleClick="false">
                        <f:title>
                            <f:DynamicPageTitle>
                                <f:heading>
                                    <Title text="Transmission Job Schedules" level="H1"/>
                                </f:heading>
                                <f:actions>
                                    <Button text="Create" type="Emphasized" press=".onCreate"/>
                                </f:actions>
                            </f:DynamicPageTitle>
                        </f:title>

                        <f:content>
                            <Table
                                id="schedulesTable"
                                mode="SingleSelectMaster"
                                items="{schedules>/schedules}"
                                growing="true"
                                growingThreshold="20">

                                <headerToolbar>
                                    <OverflowToolbar>
                                        <Title text="Schedules ({schedules>/schedules/length})" level="H2"/>
                                        <ToolbarSpacer/>
                                        <SearchField width="20rem" search=".onSearch"/>
                                    </OverflowToolbar>
                                </headerToolbar>

                                <columns>
                                    <Column width="12%"><Text text="Schedule ID"/></Column>
                                    <Column width="10%"><Text text="Status"/></Column>
                                    <Column width="15%"><Text text="Category"/></Column>
                                    <Column width="15%"><Text text="Issue Type"/></Column>
                                    <Column width="15%"><Text text="Sold-to Party"/></Column>
                                    <Column width="12%"><Text text="Valid From"/></Column>
                                    <Column width="12%"><Text text="Valid To"/></Column>
                                    <Column width="9%"><Text text="Frequency"/></Column>
                                </columns>

                                <items>
                                    <ColumnListItem type="Navigation" press=".onItemPress">
                                        <cells>
                                            <ObjectIdentifier
                                                title="{schedules>scheduleId}"
                                                text="{schedules>description}"/>
                                            <ObjectStatus
                                                text="{schedules>status}"
                                                state="{path: 'schedules>status', formatter: '.formatStatusState'}"/>
                                            <Text text="{schedules>category}"/>
                                            <Text text="{schedules>issueType}"/>
                                            <Text text="{schedules>soldToParty}"/>
                                            <Text text="{path: 'schedules>validFrom', type: 'sap.ui.model.type.Date', formatOptions: {pattern: 'dd/MM/yyyy'}}"/>
                                            <Text text="{path: 'schedules>validTo', type: 'sap.ui.model.type.Date', formatOptions: {pattern: 'dd/MM/yyyy'}}"/>
                                            <Text text="{schedules>frequency}"/>
                                        </cells>
                                    </ColumnListItem>
                                </items>
                            </Table>
                        </f:content>
                    </f:DynamicPage>
                </mvc:View>`;

                // Define controller
                sap.ui.define("transmissionschedules/controller/ListReport", [
                    "sap/ui/core/mvc/Controller",
                    "sap/m/MessageBox",
                    "sap/m/MessageToast",
                    "sap/ui/model/Filter",
                    "sap/ui/model/FilterOperator"
                ], function(Controller, MessageBox, MessageToast, Filter, FilterOperator) {
                    return Controller.extend("transmissionschedules.controller.ListReport", {
                        formatStatusState: function(sStatus) {
                            switch (sStatus) {
                                case "Active": return "Success";
                                case "Scheduled": return "Information";
                                case "Inactive": return "None";
                                case "Running": return "Warning";
                                case "Error": return "Error";
                                default: return "None";
                            }
                        },
                        onCreate: function() {
                            MessageBox.information("Create functionality will open a dialog to create a new schedule");
                        },
                        onSearch: function(oEvent) {
                            var sQuery = oEvent.getParameter("query");
                            var oTable = this.byId("schedulesTable");
                            var oBinding = oTable.getBinding("items");

                            if (sQuery) {
                                var aFilters = [
                                    new Filter({
                                        filters: [
                                            new Filter("scheduleId", FilterOperator.Contains, sQuery),
                                            new Filter("description", FilterOperator.Contains, sQuery),
                                            new Filter("category", FilterOperator.Contains, sQuery)
                                        ],
                                        and: false
                                    })
                                ];
                                oBinding.filter(aFilters);
                            } else {
                                oBinding.filter([]);
                            }
                        },
                        onItemPress: function(oEvent) {
                            var oItem = oEvent.getSource();
                            var oContext = oItem.getBindingContext("schedules");
                            var oData = oContext.getObject();

                            MessageBox.information(
                                "Schedule Details:\\n\\n" +
                                "ID: " + oData.scheduleId + "\\n" +
                                "Description: " + oData.description + "\\n" +
                                "Status: " + oData.status + "\\n" +
                                "Category: " + oData.category + "\\n" +
                                "Frequency: " + oData.frequency,
                                { title: "Schedule Information" }
                            );
                        }
                    });
                });

                // Create and display view
                XMLView.create({
                    definition: sView
                }).then(function(oView) {
                    oView.placeAt("content");
                });
            });
        });
    </script>
</head>
<body class="sapUiBody" id="content">
</body>
</html>
